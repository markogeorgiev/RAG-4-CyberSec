# Authoritative corpus manifest for the RAG system.
#
# ONLY the four source families specified in the study plan are used:
#   - NIST guidance documents
#   - CISA advisories / guidance
#   - MITRE ATT&CK technique descriptions
#   - OWASP documentation (Cheat Sheet Series)
#
# `type` controls how fetch_corpus.py downloads and how ingest.py extracts text:
#   pdf       -> binary PDF, text via pypdf
#   html      -> CISA web page, main text via BeautifulSoup
#   owasp_md  -> OWASP markdown cheat sheet (raw GitHub)
#   stix      -> MITRE ATT&CK STIX 2.x bundle (JSON); each technique becomes a doc
#
# `tasks` is informational only (which questions a source mainly supports) and
# does not constrain retrieval — the retriever searches the whole corpus.
# Any source that fails to download is logged and skipped, so the pipeline is
# resilient to the occasional moved URL.

sources:

  # ------------------------------------------------------------------ NIST --
  - id: nist-sp800-63b
    provider: NIST
    title: "NIST SP 800-63B: Digital Identity Guidelines — Authentication and Lifecycle Management"
    type: pdf
